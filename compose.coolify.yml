services:
  vc4:
    image: ${VC4_IMAGE:-registry.example.com/vc4-docker:latest}
    restart: unless-stopped
    ports:
      - "${VC4_HTTP_PORT:-8847}:80"
      - "${VC4_HTTPS_PORT:-8848}:443"
      - "${VC4_FLASH_POLICY_EXTERNAL_PORT:-843}:843"
      - "${VC4_CIP_TCP_PORT:-41794}:41794/tcp"
      - "${VC4_CIP_UDP_PORT:-41794}:41794/udp"
      - "${VC4_SECURE_CIP_PORT:-41796}:41796/tcp"
      - "${VC4_HTML5_XPANEL_PORT:-49200}:49200/tcp"
    environment:
      VC4_DISABLE_FRONTEND_LOCALHOST_MOCKS: "${VC4_DISABLE_FRONTEND_LOCALHOST_MOCKS:-true}"
      VC4_ENABLE_RESTART_SERVICE_SHIM: "${VC4_ENABLE_RESTART_SERVICE_SHIM:-true}"

      VC4_TLS_CERT_FILE: "${VC4_TLS_CERT_FILE:-}"
      VC4_TLS_KEY_FILE: "${VC4_TLS_KEY_FILE:-}"
      VC4_FLASH_POLICY_MODE: "${VC4_FLASH_POLICY_MODE:-}"
      VC4_FLASH_POLICY_DOMAIN: "${VC4_FLASH_POLICY_DOMAIN:-*}"
      VC4_FLASH_POLICY_PORT: "${VC4_FLASH_POLICY_PORT:-1025}"

      VC4_PAM_REQUIRE_SSL: "${VC4_PAM_REQUIRE_SSL:-true}"
      VC4_PAM_ADMIN_ENABLED: "${VC4_PAM_ADMIN_ENABLED:-false}"
      VC4_PAM_ADMIN_USERNAME: "${VC4_PAM_ADMIN_USERNAME:-}"
      VC4_PAM_ADMIN_PASSWORD: "${VC4_PAM_ADMIN_PASSWORD:-}"
      VC4_PAM_STATUS_ENABLED: "${VC4_PAM_STATUS_ENABLED:-false}"
      VC4_PAM_STATUS_USERNAME: "${VC4_PAM_STATUS_USERNAME:-}"
      VC4_PAM_STATUS_PASSWORD: "${VC4_PAM_STATUS_PASSWORD:-}"
      VC4_PAM_ROOM_CREDENTIALS_FILE: "${VC4_PAM_ROOM_CREDENTIALS_FILE:-}"
    volumes:
      - vc4_mysql:/var/lib/mysql
      - vc4_crestron:/opt/crestron
      - vc4_redis:/var/lib/redis
      - vc4_hardening:/run/vc4-hardening

volumes:
  vc4_mysql:
  vc4_crestron:
  vc4_redis:
  vc4_hardening:
